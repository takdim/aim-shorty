<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LinkCraft — Short Link & QR Code Generator{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}LinkCraft — platform manajemen tautan, QR code, dan landing page terbaik.{% endblock %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container" id="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" role="alert">
            <span>{{ message }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()" aria-label="Tutup">
              <i class="ph ph-x"></i>
            </button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block body %}{% endblock %}

  <!-- Main JS -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
