{% extends "base.html" %}
{% block title %}Reset Password — LinkCraft{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block body %}
<div class="auth-layout auth-layout--center">
  <div class="auth-form-wrap auth-form-wrap--card">
    <a href="{{ url_for('public.index') }}" class="navbar-brand auth-logo">
      <span class="brand-icon"><i class="ph ph-link-simple"></i></span>
      LinkCraft
    </a>
    <h1 class="auth-title">Buat Password Baru</h1>
    <p class="auth-subtitle">Password minimal 8 karakter.</p>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label for="password" class="form-label">Password Baru</label>
        <div class="input-wrap">
          <i class="ph ph-lock input-icon"></i>
          <input type="password" id="password" name="password" class="form-input" placeholder="Minimal 8 karakter" required />
        </div>
      </div>
      <div class="form-group">
        <label for="confirm_password" class="form-label">Konfirmasi Password</label>
        <div class="input-wrap">
          <i class="ph ph-lock-key input-icon"></i>
          <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Ulangi password" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">
        <i class="ph ph-check"></i> Simpan Password Baru
      </button>
    </form>
  </div>
</div>
{% endblock %}
