{% extends "base.html" %}
{% block title %}Lupa Password — LinkCraft{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block body %}
<div class="auth-layout auth-layout--center">
  <div class="auth-form-wrap auth-form-wrap--card">
    <a href="{{ url_for('public.index') }}" class="navbar-brand auth-logo">
      <span class="brand-icon"><i class="ph ph-link-simple"></i></span>
      LinkCraft
    </a>
    <h1 class="auth-title">Lupa Password?</h1>
    <p class="auth-subtitle">Masukkan email Anda dan kami akan kirim link reset password.</p>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <div class="input-wrap">
          <i class="ph ph-envelope input-icon"></i>
          <input type="email" id="email" name="email" class="form-input" placeholder="email@contoh.com" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        <i class="ph ph-paper-plane-tilt"></i> Kirim Link Reset
      </button>
    </form>

    <p class="auth-switch">
      <a href="{{ url_for('auth.login') }}"><i class="ph ph-arrow-left"></i> Kembali ke Login</a>
    </p>
  </div>
</div>
{% endblock %}
