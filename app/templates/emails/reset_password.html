<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f9; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #1f2937; padding: 30px; text-align: center; color: white; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; }
        .content { padding: 40px; text-align: center; }
        .content p { margin-bottom: 25px; color: #4b5563; font-size: 16px; }
        .btn { display: inline-block; padding: 14px 30px; background-color: #ef4444; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 16px; }
        .footer { background-color: #f9fafb; padding: 20px; text-align: center; color: #9ca3af; font-size: 12px; }
        .warning { font-size: 13px; color: #9ca3af; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reset Password</h1>
        </div>
        <div class="content">
            <h2>Halo, {{ user.name }}</h2>
            <p>Kami menerima permintaan untuk mereset password akun LinkCraft Anda.</p>
            <p>Klik tombol di bawah ini untuk membuat password baru:</p>
            <a href="{{ reset_url }}" class="btn">Reset Password</a>
            <p class="warning">Jika Anda tidak merasa melakukan permintaan ini, abaikan saja email ini.</p>
        </div>
        <div class="footer">
            &copy; {{ now.year }} LinkCraft.
        </div>
    </div>
</body>
</html>
